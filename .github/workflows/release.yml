name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: chainguard-actions/actions-checkout@5c571b05fb026b9251781bee09aadc0d09736c72 # v7.0.0

      - uses: chainguard-actions/astral-sh-setup-uv@c8fe6ea826d245c45890728fb7f72770528b81a2 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -v

  create-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: chainguard-actions/actions-checkout@5c571b05fb026b9251781bee09aadc0d09736c72 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: chainguard-actions/mikepenz-release-changelog-builder-action@863a718272423eb2bdcb9b59e227a520cd004876 # v6.2.3
        with:
          configuration: |
            {
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}",
              "categories": [
                {
                  "title": "## Features",
                  "labels": ["feature", "enhancement"]
                },
                {
                  "title": "## Bug Fixes",
                  "labels": ["bug", "fix"]
                },
                {
                  "title": "## Documentation",
                  "labels": ["documentation"]
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: chainguard-actions/softprops-action-gh-release@b570ea3ff6465b9c2d627e27e0303e389bc4f9c5 # v3.0.1
        with:
          body: |
            ## Installation

            ```bash
            uv tool install forge --from git+https://github.com/chainguard/forge@${{ github.ref_name }}
            ```

            Update an existing install:

            ```bash
            uv tool upgrade forge
            ```

            Then install the plugins you need:

            ```bash
            forge plugin install gauge
            forge plugin install provenance
            ```

            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
