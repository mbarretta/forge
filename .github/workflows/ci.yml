name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: chainguard-actions/actions-checkout@5c571b05fb026b9251781bee09aadc0d09736c72 # v7.0.0

      - uses: chainguard-actions/astral-sh-setup-uv@c8fe6ea826d245c45890728fb7f72770528b81a2 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check packages/

      - name: Run ruff format check
        run: uv run ruff format --check packages/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: chainguard-actions/actions-checkout@5c571b05fb026b9251781bee09aadc0d09736c72 # v7.0.0

      - uses: chainguard-actions/astral-sh-setup-uv@c8fe6ea826d245c45890728fb7f72770528b81a2 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy packages/forge-core/src packages/forge-cli/src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: chainguard-actions/actions-checkout@5c571b05fb026b9251781bee09aadc0d09736c72 # v7.0.0

      - uses: chainguard-actions/astral-sh-setup-uv@c8fe6ea826d245c45890728fb7f72770528b81a2 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest tests/ -v --cov=packages --cov-report=xml

      - name: Upload coverage
        uses: chainguard-actions/codecov-codecov-action@f39097008df9f057386177eb29865bf40c2510d8 # v7.0.0
        if: github.event_name == 'pull_request'
        with:
          files: ./coverage.xml
          flags: python

  test-plugin-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: chainguard-actions/actions-checkout@5c571b05fb026b9251781bee09aadc0d09736c72 # v7.0.0

      - uses: chainguard-actions/astral-sh-setup-uv@c8fe6ea826d245c45890728fb7f72770528b81a2 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify bundled registry lists known plugins
        run: |
          output=$(uv run forge plugin list)
          echo "$output"
          echo "$output" | grep -q "gauge" || (echo "ERROR: 'gauge' not found in plugin list" && exit 1)
          echo "$output" | grep -q "provenance" || (echo "ERROR: 'provenance' not found in plugin list" && exit 1)

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: chainguard-actions/actions-checkout@5c571b05fb026b9251781bee09aadc0d09736c72 # v7.0.0

      - name: Run Trivy vulnerability scanner
        uses: chainguard-actions/aquasecurity-trivy-action@d4b58e4b9d56c13c11d7f30dbe296d7d32ec2d31 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
